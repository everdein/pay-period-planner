name: Documentation Drift

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  documentation-drift:
    name: Documentation drift packet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run documentation drift check
        shell: pwsh
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          $arguments = @()

          if (-not [string]::IsNullOrWhiteSpace($env:BASE_SHA) -and
              -not [string]::IsNullOrWhiteSpace($env:HEAD_SHA)) {
            $arguments += @("-BaseRef", $env:BASE_SHA, "-HeadRef", $env:HEAD_SHA)
          }

          try {
            & ./scripts/check-documentation-drift.ps1 @arguments
          }
          catch {
            $message = $_.Exception.Message
            Write-Host "::warning title=Documentation drift packet unavailable::Packet generation failed; see step summary."

            $summary = @(
              "# Documentation drift packet",
              "",
              "Packet generation failed, so this advisory workflow is reporting a warning instead of blocking the PR.",
              "",
              "Error:",
              "",
              '```',
              $message,
              '```'
            ) -join [Environment]::NewLine

            if (-not [string]::IsNullOrWhiteSpace($env:GITHUB_STEP_SUMMARY)) {
              Set-Content -LiteralPath $env:GITHUB_STEP_SUMMARY -Value $summary -Encoding UTF8
            }

            Write-Host $summary
            exit 0
          }
