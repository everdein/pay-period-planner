name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Principle of least privilege for default actions.
permissions:
  contents: read

jobs:
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Placeholder - Lint / Static checks
        run: |
          echo "Code quality checks can be added here"

  build-backend:
    name: Build & Test Backend
    runs-on: ubuntu-latest
    needs: [code-quality]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build Backend
        working-directory: backend
        run: |
          chmod +x mvnw || true
          ./mvnw -B clean verify

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [code-quality]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install & Build Frontend
        working-directory: frontend
        run: |
          npm install
          npm run build --if-present

  scans:
    name: Scans
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (for Snyk)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Snyk test (report only)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --all-projects --severity-threshold=high || true

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    needs: [scans]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy Placeholder
        run: echo "Manual deploy triggered. Add your deploy steps here."