# cspell:ignore isready Ppostgres
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Principle of least privilege for default actions.
permissions:
  contents: read

jobs:
  code-coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests with coverage
        working-directory: frontend
        run: npm run test -- --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: frontend/coverage
          if-no-files-found: error

  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Verify frontend dependency compatibility
        working-directory: frontend
        run: npm run check:dependency-compat

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

  spell-check:
    name: Spell Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install root tool dependencies
        run: npm ci

      - name: Run cspell
        run: npm run spell

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run TypeScript type check
        working-directory: frontend
        run: npm run type-check

  build-backend:
    name: Build & Test Backend
    runs-on: ubuntu-latest
    needs: [code-coverage, lint, spell-check, type-check]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Verify backend formatting
        working-directory: backend
        run: |
          chmod +x mvnw || true
          ./mvnw -B spotless:check sortpom:verify

      - name: Build Backend
        working-directory: backend
        run: |
          chmod +x mvnw || true
          ./mvnw -B clean verify

      - name: Upload backend coverage report
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage
          path: backend/target/site/jacoco
          if-no-files-found: error

  postgres-integration:
    name: PostgreSQL Integration
    runs-on: ubuntu-latest
    needs: [code-coverage, lint, spell-check, type-check]
    timeout-minutes: 15
    env:
      DATABASE_PASSWORD: financial_app_password
      DATABASE_URL: jdbc:postgresql://localhost:5432/financial_app
      DATABASE_USERNAME: financial_app_user
      RUN_POSTGRES_INTEGRATION_TESTS: 'true'
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: financial_app
          POSTGRES_PASSWORD: financial_app_password
          POSTGRES_USER: financial_app_user
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U financial_app_user -d financial_app"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run isolated PostgreSQL integration tests
        working-directory: backend
        run: |
          chmod +x mvnw || true
          ./mvnw -B test -Ppostgres-integration -Djacoco.skip=true

  coverage-summary:
    name: Coverage Summary
    runs-on: ubuntu-latest
    needs: [code-coverage, build-backend]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download frontend coverage report
        uses: actions/download-artifact@v7
        with:
          name: frontend-coverage
          path: frontend/coverage

      - name: Download backend coverage report
        uses: actions/download-artifact@v7
        with:
          name: backend-coverage
          path: backend/target/site/jacoco

      - name: Write coverage summary packet
        shell: pwsh
        run: ./scripts/write-coverage-summary.ps1

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [code-coverage, lint, spell-check, type-check]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Build Frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build --if-present

  accessibility:
    name: Accessibility
    runs-on: ubuntu-latest
    needs: [code-coverage, lint, spell-check, type-check]
    timeout-minutes: 15
    env:
      BROWSER_TEST_SCHEMA: financials_accessibility_ci
      DATABASE_PASSWORD: financial_app_password
      DATABASE_USERNAME: financial_app_user
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: financial_app
          POSTGRES_PASSWORD: financial_app_password
          POSTGRES_USER: financial_app_user
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U financial_app_user -d financial_app"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run live accessibility audit
        working-directory: frontend
        run: |
          chmod +x ../backend/mvnw || true
          npm run test:a11y -- --project chromium

      - name: Upload accessibility report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: accessibility-playwright-report
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore

  responsive:
    name: Responsive
    runs-on: ubuntu-latest
    needs: [code-coverage, lint, spell-check, type-check]
    timeout-minutes: 15
    env:
      BROWSER_TEST_SCHEMA: financials_responsive_ci
      DATABASE_PASSWORD: financial_app_password
      DATABASE_USERNAME: financial_app_user
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: financial_app
          POSTGRES_PASSWORD: financial_app_password
          POSTGRES_USER: financial_app_user
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U financial_app_user -d financial_app"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run live responsive audit
        working-directory: frontend
        run: |
          chmod +x ../backend/mvnw || true
          npm run test:responsive -- --project chromium

      - name: Upload responsive report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: responsive-playwright-report
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore

  scans:
    name: Scans
    runs-on: ubuntu-latest
    needs: [accessibility, build-backend, build-frontend, postgres-integration, responsive]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js (for Snyk)
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Check Snyk CLI token availability
        id: snyk-token
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -n "${SNYK_TOKEN}" ]; then
            echo "available=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "available=false" >> "${GITHUB_OUTPUT}"

          if [ "${GITHUB_ACTOR}" = "dependabot[bot]" ]; then
            echo "::warning title=Snyk CLI scan skipped::SNYK_TOKEN is unavailable to Dependabot-triggered workflows. Review the repository Snyk PR check and rerun the CI workflow manually if CLI confirmation is required."
            exit 0
          fi

          echo "::error title=Snyk CLI scan unavailable::SNYK_TOKEN is not configured for this workflow run."
          exit 1

      - name: Install Snyk CLI
        if: steps.snyk-token.outputs.available == 'true'
        id: snyk-cli
        run: |
          version="$(tr -d '[:space:]' < .snyk-cli-version)"
          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error title=Invalid Snyk CLI pin::.snyk-cli-version must contain one semantic version."
            exit 1
          fi

          npm install -g "snyk@${version}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Verify Snyk CLI version
        if: steps.snyk-token.outputs.available == 'true'
        env:
          SNYK_CLI_VERSION: ${{ steps.snyk-cli.outputs.version }}
        run: |
          actual="$(snyk --version)"
          if [ "${actual}" != "${SNYK_CLI_VERSION}" ]; then
            echo "::error title=Snyk CLI version mismatch::Expected ${SNYK_CLI_VERSION}, received ${actual}."
            exit 1
          fi

          echo "Using pinned Snyk CLI ${actual}."

      - name: Snyk test
        if: steps.snyk-token.outputs.available == 'true'
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --all-projects --severity-threshold=high

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    needs: [scans]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Deploy Placeholder
        run: echo "Manual deploy triggered. Add your deploy steps here."
