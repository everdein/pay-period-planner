name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Principle of least privilege for default actions.
permissions:
  contents: read

jobs:
  code-coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests with coverage
        working-directory: frontend
        run: npm run test -- --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage
          if-no-files-found: error

  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

  spell-check:
    name: Spell Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install root tool dependencies
        run: npm ci

      - name: Run cspell
        run: npm run spell

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run TypeScript type check
        working-directory: frontend
        run: npm run type-check

  build-backend:
    name: Build & Test Backend
    runs-on: ubuntu-latest
    needs: [code-coverage, lint, spell-check, type-check]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Verify backend formatting
        working-directory: backend
        run: |
          chmod +x mvnw || true
          ./mvnw -B spotless:check sortpom:verify

      - name: Build Backend
        working-directory: backend
        run: |
          chmod +x mvnw || true
          ./mvnw -B clean verify

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [code-coverage, lint, spell-check, type-check]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Build Frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build --if-present

  scans:
    name: Scans
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (for Snyk)
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Check Snyk CLI token availability
        id: snyk-token
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -n "${SNYK_TOKEN}" ]; then
            echo "available=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "available=false" >> "${GITHUB_OUTPUT}"

          if [ "${GITHUB_ACTOR}" = "dependabot[bot]" ]; then
            echo "::warning title=Snyk CLI scan skipped::SNYK_TOKEN is unavailable to Dependabot-triggered workflows. Review the repository Snyk PR check and rerun the CI workflow manually if CLI confirmation is required."
            exit 0
          fi

          echo "::error title=Snyk CLI scan unavailable::SNYK_TOKEN is not configured for this workflow run."
          exit 1

      - name: Install Snyk CLI
        if: steps.snyk-token.outputs.available == 'true'
        run: npm install -g snyk

      - name: Snyk test
        if: steps.snyk-token.outputs.available == 'true'
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --all-projects --severity-threshold=high

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    needs: [scans]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy Placeholder
        run: echo "Manual deploy triggered. Add your deploy steps here."
