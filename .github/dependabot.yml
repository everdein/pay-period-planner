version: 2

updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
      timezone: 'America/Los_Angeles'
    open-pull-requests-limit: 3
    groups:
      root-tooling:
        dependency-type: 'development'
        update-types:
          - 'minor'
          - 'patch'

  - package-ecosystem: 'npm'
    directory: '/frontend'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:30'
      timezone: 'America/Los_Angeles'
    open-pull-requests-limit: 5
    groups:
      frontend-runtime:
        dependency-type: 'production'
        update-types:
          - 'minor'
          - 'patch'
      frontend-tooling:
        dependency-type: 'development'
        update-types:
          - 'minor'
          - 'patch'

  - package-ecosystem: 'maven'
    directory: '/backend'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '07:00'
      timezone: 'America/Los_Angeles'
    open-pull-requests-limit: 3
    groups:
      backend-minor-patch:
        update-types:
          - 'minor'
          - 'patch'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '07:30'
      timezone: 'America/Los_Angeles'
    open-pull-requests-limit: 3
    groups:
      github-actions-minor-patch:
        update-types:
          - 'minor'
          - 'patch'
