<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta
      name="description"
      content="Plan household cash flow around pay periods, recurring bills, savings, debt, and important dates."
    />

    <meta name="theme-color" content="#ffffff" />

    <script>
      (function () {
        try {
          var savedTheme = window.localStorage.getItem('pay-period-planner-theme');
          var preferredTheme = window.matchMedia('(prefers-color-scheme: dark)').matches
            ? 'dark'
            : 'light';
          var theme =
            savedTheme === 'light' || savedTheme === 'dark' ? savedTheme : preferredTheme;
          document.documentElement.dataset.theme = theme;
          document
            .querySelector('meta[name="theme-color"]')
            .setAttribute('content', theme === 'dark' ? '#101311' : '#ffffff');
        } catch (error) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>

    <title>Pay Period Planner</title>
  </head>

  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
