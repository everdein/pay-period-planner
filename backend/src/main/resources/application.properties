spring.application.name=backend
financials.security.username=${FINANCIALS_API_USERNAME:financial_app}
financials.security.password=${FINANCIALS_API_PASSWORD:financial_app_local_password}
financials.security.allowed-origins=${FINANCIALS_ALLOWED_ORIGINS:}
financials.security.max-request-bytes=${FINANCIALS_MAX_REQUEST_BYTES:1048576}
financials.security.session-duration=${FINANCIALS_SESSION_DURATION:7d}
financials.security.session-cookie-secure=${FINANCIALS_SESSION_COOKIE_SECURE:false}
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/financial_app}
spring.datasource.username=${DATABASE_USERNAME:financial_app_user}
spring.datasource.password=${DATABASE_PASSWORD:financial_app_password}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.flyway.enabled=true
spring.flyway.default-schema=public
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=public
spring.flyway.validate-migration-naming=true
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=never
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
