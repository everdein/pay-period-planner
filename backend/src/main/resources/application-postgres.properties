financials.persistence.mode=postgres

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/end_to_end_app}
spring.datasource.username=${DATABASE_USERNAME:app}
spring.datasource.password=${DATABASE_PASSWORD:app}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
